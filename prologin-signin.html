<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ProLogin – Sign In</title>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0f1e;
      --surface: #111827;
      --border: #1e2d45;
      --accent: #3b82f6;
      --accent2: #06b6d4;
      --text: #f1f5f9;
      --muted: #64748b;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Animated grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(59,130,246,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(59,130,246,0.04) 1px, transparent 1px);
      background-size: 40px 40px;
      animation: gridMove 20s linear infinite;
      z-index: 0;
    }

    @keyframes gridMove {
      0% { background-position: 0 0; }
      100% { background-position: 40px 40px; }
    }

    /* Glow orbs */
    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.15;
      z-index: 0;
      animation: pulse 6s ease-in-out infinite alternate;
    }
    .orb1 { width: 400px; height: 400px; background: var(--accent); top: -100px; left: -100px; }
    .orb2 { width: 300px; height: 300px; background: var(--accent2); bottom: -80px; right: -80px; animation-delay: 3s; }

    @keyframes pulse {
      from { opacity: 0.1; transform: scale(1); }
      to   { opacity: 0.2; transform: scale(1.1); }
    }

    .card {
      position: relative;
      z-index: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 48px 44px;
      width: 100%;
      max-width: 400px;
      text-align: center;
      box-shadow: 0 0 0 1px rgba(59,130,246,0.1), 0 32px 64px rgba(0,0,0,0.5);
      animation: fadeUp 0.6s cubic-bezier(0.16,1,0.3,1) both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .logo-wrap {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 28px;
    }

    .logo-icon {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Space Mono', monospace;
      font-size: 16px;
      font-weight: 700;
      color: white;
    }

    .logo-text {
      font-family: 'Space Mono', monospace;
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -0.5px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    h1 {
      font-size: 22px;
      font-weight: 600;
      margin-bottom: 8px;
      color: var(--text);
    }

    p {
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 32px;
      line-height: 1.6;
    }

    .signin-wrap {
      display: flex;
      justify-content: center;
      margin-bottom: 24px;
    }

    /* Override Google button container to center */
    #g_id_onload { display: none; }

    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }
    .divider span {
      font-size: 11px;
      color: var(--muted);
      font-family: 'Space Mono', monospace;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .footer-note {
      font-size: 12px;
      color: var(--muted);
      line-height: 1.6;
      margin-top: 24px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
    }

    .footer-note a {
      color: var(--accent);
      text-decoration: none;
    }
  </style>
</head>
<body>

  <div class="orb orb1"></div>
  <div class="orb orb2"></div>

  <!-- Google Identity init -->
  <div id="g_id_onload"
    data-client_id="455711355853-862dgidd6ccno9ltk93hqnk2nktg8puv.apps.googleusercontent.com"
    data-context="signin"
    data-ux_mode="popup"
    data-callback="handleCredentialResponse"
    data-auto_prompt="false">
  </div>

  <div class="card">
    <div class="logo-wrap">
      <div class="logo-icon">P</div>
      <span class="logo-text">ProLogin</span>
    </div>

    <h1>Welcome back</h1>
    <p>Sign in to access your ProSchools account and continue learning.</p>

    <div class="divider"><span>continue with</span></div>

    <div class="signin-wrap">
      <div class="g_id_signin"
        data-type="standard"
        data-shape="rectangular"
        data-theme="outline"
        data-text="signin_with"
        data-size="large"
        data-logo_alignment="left"
        data-width="280">
      </div>
    </div>

    <p class="footer-note">
      By signing in you agree to ProSchools'
      <a href="https://proschools.net" target="_blank">Terms of Service</a>.
      Your school account is managed by your administrator.
    </p>
  </div>

  <script>
    function handleCredentialResponse(response) {
      // Decode the JWT to get user info
      const payload = JSON.parse(atob(response.credential.split('.')[1]));
      console.log('Signed in as:', payload.name, payload.email);

      // Optional: redirect after sign-in
      // window.top.location.href = 'https://sites.google.com/proschools.net/prologin/home';
    }
  </script>

</body>
</html>
